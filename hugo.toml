baseURL = "https://issaNzamba.github.io"
languageCode = "fr"
title = "DevOps & Cloud — Issa Nzamba"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
  tag = "tags"
  series = "series"

paginate = 10

[params]
  author = "Issa Nzamba"
  description = "DevOps Engineer · Cloud · IaC · Python Automation"
  DateFormat = "2 January 2006"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.profileMode]
    enabled = true
    title = "DevOps Engineer"
    subtitle = "Cloud · IaC · Automation · Security"

    [[params.profileMode.buttons]]
      name = "Articles"
      url = "/posts"

    [[params.profileMode.buttons]]
      name = "A propos"
      url = "/about"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/issa-nzamba-diawara-399a47291/"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/issaNzamba"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[[menu.main]]
  name = "Articles"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "A propos"
  url = "/about/"
  weight = 20

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
